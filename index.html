                let indices = new Set();
                let attempt = 0;
                
                while(items.length < count && attempt < 50) {
                    // Create pseudo-random index based on seed + attempt
                    const index = (seed + (attempt * 137)) % arr.length;

                        items.push(arr[index]);

                    attempt++;

                }, 800);
            };

            const handleSubscribe = () => {
                window.open(YOUTUBE_CHANNEL_URL, '_blank');
                setTimeout(() => setHasClickedSub(true), 1500); 
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-[#0f0c29] text-white p-4 relative overflow-hidden">
                    {/* Background Effects */}
                    <div className="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none">
                        <div className="absolute top-10 left-10 text-4xl animate-float opacity-50">💖</div>
                        <div className="absolute bottom-20 right-10 text-4xl animate-float opacity-50" style={{animationDelay: '1s'}}>✨</div>
                        <div className="absolute top-1/2 left-1/4 text-2xl animate-float opacity-30" style={{animationDelay: '2s'}}>🔮</div>
                    </div>

                    <div className="w-full max-w-md glass rounded-3xl p-6 md:p-8 relative z-10 shadow-2xl shadow-pink-500/20">
                        
                        {/* HEADER */}
                        <div className="text-center mb-8">
                            <h2 className="text-4xl md:text-5xl font-valentine bg-gradient-to-r from-red-400 via-pink-500 to-purple-500 bg-clip-text text-transparent mb-4 animate-fade-in-up drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)]">
                                Happy Valentine's Day ❤️
                            </h2>
                            <h1 className="text-xl md:text-2xl font-bold text-gray-400 opacity-90">
                                AI Love Predictor 🔮
                            </h1>
                        </div>

                        {/* INPUT STAGE */}
                        {stage === "input" && (
                            <div className="space-y-6 animate-zoom-in">
                                <div className="flex bg-gray-800/50 rounded-full p-1 border border-gray-700">
                                    <button onClick={() => setMode("couple")} className={`flex-1 py-2 rounded-full text-sm font-medium transition-all ${mode === "couple" ? "bg-gradient-to-r from-pink-500 to-purple-500 text-white shadow-lg" : "text-gray-400 hover:text-white"}`}>Match Couple ❤️</button>
                                    <button onClick={() => setMode("single")} className={`flex-1 py-2 rounded-full text-sm font-medium transition-all ${mode === "single" ? "bg-gradient-to-r from-blue-500 to-cyan-500 text-white shadow-lg" : "text-gray-400 hover:text-white"}`}>I'm Single 🧍</button>
                                </div>

                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-gray-400 text-xs mb-1 ml-2">YOUR NAME</label>
                                        <input type="text" value={name1} onChange={(e) => setName1(e.target.value)} className="w-full bg-gray-900/50 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-pink-500 transition-colors" placeholder="Enter your name..." />
                                    </div>

                                    {mode === "single" && (
                                        <div>
                                            <label className="block text-gray-400 text-xs mb-2 ml-2">I AM A</label>
                                            <div className="flex gap-4">
                                                <button onClick={() => setGender("male")} className={`flex-1 py-2 rounded-xl border ${gender === "male" ? "bg-blue-500/20 border-blue-500 text-blue-200" : "border-gray-700 text-gray-500"}`}>Boy 👨</button>
                                                <button onClick={() => setGender("female")} className={`flex-1 py-2 rounded-xl border ${gender === "female" ? "bg-pink-500/20 border-pink-500 text-pink-200" : "border-gray-700 text-gray-500"}`}>Girl 👩</button>
                                            </div>
                                        </div>
                                    )}
                                    
                                    {mode === "couple" && (
                                        <div>
                                            <label className="block text-gray-400 text-xs mb-1 ml-2">PARTNER'S NAME</label>
                                            <input type="text" value={name2} onChange={(e) => setName2(e.target.value)} className="w-full bg-gray-900/50 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-pink-500 transition-colors" placeholder="Enter partner's name..." />
                                        </div>
                                    )}
                                </div>

                                <button onClick={handleAnalyze} className="w-full py-4 bg-gradient-to-r from-pink-600 to-purple-600 rounded-xl font-bold text-lg shadow-lg hover:scale-[1.02] active:scale-95 transition-all btn-glow">
                                    Analyze Future ⚡
                                </button>
                            </div>
                        )}

                        {/* ANALYZING STAGE */}
                        {stage === "analyzing" && (
                            <div className="text-center py-10 space-y-4">
                                <div className="inline-block text-6xl animate-bounce">💓</div>
                                <h3 className="text-xl font-semibold text-pink-200">{loadingText}</h3>
                                <div className="w-full bg-gray-800 h-2 rounded-full overflow-hidden">
                                    <div className="h-full bg-pink-500 w-1/2 animate-pulse"></div>
                                </div>
                            </div>
                        )}

                        {/* LOCKED STAGE */}
                        {stage === "locked" && (
                            <div className="text-center space-y-6 animate-zoom-in">
                                <div className="text-5xl">🔒</div>
                                <h2 className="text-2xl font-bold text-white">Report Ready!</h2>
                                <p className="text-gray-300">
                                    Your detailed 5-Point prediction is generated.<br/>
                                    <span className="text-pink-400 font-semibold">Subscribe to Kavi Twins</span> to unlock!
                                </p>
                                
                                <div className="space-y-3 pt-4">
                                    <button onClick={handleSubscribe} className="w-full py-3 bg-[#FF0000] hover:bg-[#cc0000] text-white rounded-xl font-bold text-lg shadow-lg flex items-center justify-center gap-2 transition-transform hover:scale-105">
                                        Subscribe to Unlock
                                    </button>
                                    
                                    <button 
                                        onClick={() => hasClickedSub ? setStage("result") : alert("Please Subscribe first to see the magic! 🥺")} 
                                        className={`w-full py-3 border rounded-xl font-semibold transition-all ${hasClickedSub ? "border-green-500 text-green-400 hover:bg-green-500/10" : "border-gray-700 text-gray-500 cursor-not-allowed"}`}
                                    >
                                        {hasClickedSub ? "Show My Prediction ✨" : "Verifying..."}
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* RESULT STAGE - UPDATED FOR MULTIPLE PREDICTIONS */}
                        {stage === "result" && finalResult && (
                            <div className="text-center space-y-4 animate-zoom-in">
                                
                                {/* Percentage Circle */}
                                <div className="relative inline-block mb-2">
                                    <svg className="w-24 h-24 transform -rotate-90">
                                        <circle cx="48" cy="48" r="44" stroke="#333" strokeWidth="6" fill="none" />
                                        <circle cx="48" cy="48" r="44" stroke="#ec4899" strokeWidth="6" fill="none" strokeDasharray="276" strokeDashoffset={276 - (276 * finalResult.percent) / 100} className="transition-all duration-1000" />
                                    </svg>
                                    <span className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-xl font-bold">{finalResult.percent}%</span>
                                </div>

                                <h2 className="text-xl font-bold text-pink-300 border-b border-gray-700 pb-2">
                                    {finalResult.details.title}
                                </h2>

                                {/* If Single, Show Partner Name */}
                                {mode === "single" && (
                                    <div className="bg-gradient-to-r from-pink-500/20 to-purple-500/20 border border-pink-500/30 rounded-xl p-3 mb-4">
                                        <p className="text-2xl font-bold text-pink-400">{finalResult.details.highlight}</p>
                                    </div>
                                )}
                                
                                {/* LIST OF 5 PREDICTIONS */}
                                <div className="text-left space-y-3 max-h-60 overflow-y-auto pr-1">
                                    {finalResult.details.predictions.map((pred, index) => (
                                        <div key={index} className="flex items-start bg-white/5 p-3 rounded-lg border border-white/5 hover:border-pink-500/30 transition-colors">
                                            <span className="text-pink-400 mr-2 mt-1">✨</span>
                                            <p className="text-sm text-gray-200 font-sinhala leading-relaxed">
                                                {pred}
                                            </p>
                                        </div>
                                    ))}
                                </div>

                                <div className="pt-4">
                                    <button onClick={() => {setStage("input"); setName1(""); setName2(""); setHasClickedSub(false);}} className="text-gray-400 hover:text-white text-sm underline">
                                        Check Another Name
                                    </button>
                                </div>
                            </div>
                        )}

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
